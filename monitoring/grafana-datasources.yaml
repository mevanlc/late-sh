apiVersion: 1

datasources:
  - name: VictoriaTraces
    uid: victoriatraces
    type: jaeger
    access: proxy
    orgId: 1
    url: http://victoriatraces:10428/select/jaeger
    basicAuth: false
    isDefault: false
    version: 3
    editable: false
    jsonData:
      nodeGraph:
        enabled: true
      tracesToLogsV2:
        datasourceUid: victorialogs
        spanStartTimeShift: '-1m'
        spanEndTimeShift: '1m'
        filterByTraceID: true
        filterBySpanID: false
        customQuery: true
        query: 'trace_id:"$${__span.traceId}"'

  - name: VictoriaMetrics
    uid: victoriametrics
    type: victoriametrics-metrics-datasource
    access: proxy
    orgId: 1
    url: http://victoriametrics:8428
    basicAuth: false
    isDefault: true
    version: 2
    editable: false
    jsonData:
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: victoriatraces

  - name: VictoriaLogs
    uid: victorialogs
    type: victoriametrics-logs-datasource
    access: proxy
    orgId: 1
    url: http://victorialogs:9428
    basicAuth: false
    isDefault: false
    version: 7
    editable: true
    jsonData:
      logLevelRules:
        - field: "severity"
          value: "^ERROR$"
          level: "error"
          operator: "regex"
          enabled: true
        - field: "severity"
          value: "^WARN(ING)?$"
          level: "warning"
          operator: "regex"
          enabled: true
        - field: "severity"
          value: "^INFO$"
          level: "info"
          operator: "regex"
          enabled: true
        - field: "severity"
          value: "^DEBUG$"
          level: "debug"
          operator: "regex"
          enabled: true
        - field: "severity"
          value: "^TRACE$"
          level: "trace"
          operator: "regex"
          enabled: true
        - field: "severity"
          value: "^(FATAL|CRITICAL)$"
          level: "critical"
          operator: "regex"
          enabled: true
      derivedFields:
        - name: "TraceID"
          matcherType: "label"
          matcherRegex: "trace_id"
          datasourceUid: "victoriatraces"
          url: "$${__value.raw}"
